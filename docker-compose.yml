# Local development stack for archetype-core-etl.
#
# All secrets are sourced from .env (see .env.example for the required keys).
# No credentials are baked into this file; all image tags are pinned.
#
# Usage:
#   cp .env.example .env           # then fill in real values
#   cp docker-compose.override.yml.example docker-compose.override.yml  # optional
#   docker compose up -d

x-airflow-common: &airflow-common
  # ---------------------------------------------------------------------------
  # Settings below verified against Apache Airflow 3.2.0.
  # Sources:
  #   - https://airflow.apache.org/docs/apache-airflow/3.2.0/configurations-ref.html
  #   - https://airflow.apache.org/docs/apache-airflow/3.2.0/core-concepts/auth-manager/simple/index.html
  #   - https://airflow.apache.org/docs/apache-airflow-providers-fab/stable/cli-ref.html
  #   - https://airflow.apache.org/docs/docker-stack/entrypoint.html
  #
  # 3.2.0 patches CVE-2025-57735 (JWT invalidation bypass),
  # CVE-2025-68675 (proxy credential exposure in logs), and
  # CVE-2025-68438 (secret exposure in rendered templates UI).
  # ---------------------------------------------------------------------------
  image: apache/airflow:3.2.0
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # The 3.2 default is SimpleAuthManager, which only supports static users
    # configured via [core] simple_auth_manager_users with auto-generated
    # passwords. We need a deterministic admin password sourced from .env, so
    # we explicitly switch to the FAB auth manager (installed below via
    # _PIP_ADDITIONAL_REQUIREMENTS) which supports `airflow users create -p`.
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    # Airflow 3.x moved webserver-side config under [api]; AIRFLOW__API__SECRET_KEY
    # and AIRFLOW__API__EXPOSE_CONFIG are the canonical 3.x keys. There is
    # intentionally no AIRFLOW__API__AUTH_BACKENDS — that setting was removed
    # in 3.x; auth backend selection is now the auth manager's responsibility.
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__API__EXPOSE_CONFIG: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # Local-dev only: install the FAB provider on container start. For a
    # production image this should be baked into a custom Dockerfile instead.
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-fab>=2.0.0"
    # AWS / LocalStack wiring for local S3 emulation.
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    AWS_ENDPOINT_URL: http://localstack:4566
    # Application-level audit DB connection (separate logical database).
    ARCHETYPE_AUDIT_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AUDIT_DB_NAME}
  volumes:
    - airflow-dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - airflow-config:/opt/airflow/config
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.2.5-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.5.0
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      PERSISTENCE: "1"
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname "$${_AIRFLOW_WWW_USER_FIRSTNAME}" \
          --lastname "$${_AIRFLOW_WWW_USER_LASTNAME}" \
          --role Admin \
          --email "$${_AIRFLOW_WWW_USER_EMAIL}" || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    # Airflow 3.x replaced `airflow webserver` with `airflow api-server`,
    # which serves both the REST API and the UI on port 8080.
    command: api-server
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    healthcheck:
      # Airflow 3.x moved the health endpoint under /api/v2/monitor/health.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8974/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-celery-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      # Gracefully stop picking up new tasks on SIGTERM so compose shutdowns
      # do not strand running tasks mid-execution.
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test:
        - "CMD-SHELL"
        # Airflow 3.x ships the Celery executor via the provider package.
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  localstack-data:
  airflow-dags:
  airflow-logs:
  airflow-plugins:
  airflow-config:
