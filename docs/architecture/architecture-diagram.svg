<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>archetype-core-etl architecture diagram</title>
<desc>Pipeline flow from S3 ingestion through quality gate, Bedrock classification, to Databricks Delta Lake and PostgreSQL audit trail, orchestrated by Airflow</desc>

<style>
  :root {
    --bg: #ffffff;
    --text-primary: #2C2C2A;
    --text-secondary: #5F5E5A;
    --border: rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --border: rgba(255,255,255,0.15);
    }
    .fill-gray { fill: #2C2C2A; stroke: #B4B2A9; }
    .fill-blue { fill: #042C53; stroke: #85B7EB; }
    .fill-teal { fill: #04342C; stroke: #5DCAA5; }
    .fill-green { fill: #173404; stroke: #97C459; }
    .fill-purple { fill: #26215C; stroke: #AFA9EC; }
    .fill-amber { fill: #412402; stroke: #FAC775; }
    .fill-coral { fill: #4A1B0C; stroke: #F0997B; }
    .t-gray { fill: #B4B2A9; }
    .th-gray { fill: #D3D1C7; font-weight: 500; }
    .ts-gray { fill: #888780; }
    .t-blue { fill: #85B7EB; }
    .th-blue { fill: #B5D4F4; font-weight: 500; }
    .ts-blue { fill: #85B7EB; }
    .t-teal { fill: #5DCAA5; }
    .th-teal { fill: #9FE1CB; font-weight: 500; }
    .ts-teal { fill: #5DCAA5; }
    .t-green { fill: #97C459; }
    .th-green { fill: #C0DD97; font-weight: 500; }
    .ts-green { fill: #97C459; }
    .t-purple { fill: #AFA9EC; }
    .th-purple { fill: #CECBF6; font-weight: 500; }
    .ts-purple { fill: #AFA9EC; }
    .t-amber { fill: #FAC775; }
    .th-amber { fill: #FAC775; font-weight: 500; }
    .ts-amber { fill: #EF9F27; }
    .t-coral { fill: #F0997B; }
    .th-coral { fill: #F5C4B3; font-weight: 500; }
    .ts-coral { fill: #F0997B; }
  }
  .fill-gray { fill: #F1EFE8; stroke: #5F5E5A; }
  .fill-blue { fill: #E6F1FB; stroke: #185FA5; }
  .fill-teal { fill: #E1F5EE; stroke: #0F6E56; }
  .fill-green { fill: #EAF3DE; stroke: #3B6D11; }
  .fill-purple { fill: #EEEDFE; stroke: #534AB7; }
  .fill-amber { fill: #FAEEDA; stroke: #854F0B; }
  .fill-coral { fill: #FAECE7; stroke: #993C1D; }
  .t-gray { fill: #2C2C2A; }
  .th-gray { fill: #2C2C2A; font-weight: 500; }
  .ts-gray { fill: #5F5E5A; }
  .t-blue { fill: #042C53; }
  .th-blue { fill: #0C447C; font-weight: 500; }
  .ts-blue { fill: #185FA5; }
  .t-teal { fill: #04342C; }
  .th-teal { fill: #085041; font-weight: 500; }
  .ts-teal { fill: #0F6E56; }
  .t-green { fill: #173404; }
  .th-green { fill: #27500A; font-weight: 500; }
  .ts-green { fill: #3B6D11; }
  .t-purple { fill: #26215C; }
  .th-purple { fill: #3C3489; font-weight: 500; }
  .ts-purple { fill: #534AB7; }
  .t-amber { fill: #412402; }
  .th-amber { fill: #633806; font-weight: 500; }
  .ts-amber { fill: #854F0B; }
  .t-coral { fill: #4A1B0C; }
  .th-coral { fill: #712B13; font-weight: 500; }
  .ts-coral { fill: #993C1D; }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; }
  .arr { stroke: var(--text-secondary, #5F5E5A); stroke-width: 1.5; }
  .leader { stroke: var(--text-secondary, #5F5E5A); stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Orchestration container -->
<rect class="fill-gray" x="40" y="30" width="600" height="550" rx="20" stroke-width="0.5"/>
<text class="th th-gray" x="340" y="58" text-anchor="middle">Apache Airflow (MWAA)</text>
<text class="ts ts-gray" x="340" y="76" text-anchor="middle">Batch: every 6 hours / Streaming: every 5 minutes</text>

<!-- Stage 1: Extract -->
<rect class="fill-blue" x="80" y="100" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-blue" x="200" y="122" text-anchor="middle" dominant-baseline="central">Extract</text>
<text class="ts ts-blue" x="200" y="140" text-anchor="middle" dominant-baseline="central">S3 Reader / Kinesis Reader</text>

<!-- S3 source -->
<rect class="fill-teal" x="420" y="100" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-teal" x="510" y="122" text-anchor="middle" dominant-baseline="central">Amazon S3</text>
<text class="ts ts-teal" x="510" y="140" text-anchor="middle" dominant-baseline="central">NDJSON documents</text>

<line x1="420" y1="128" x2="322" y2="128" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 2: Quality Gate -->
<rect class="fill-green" x="80" y="190" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-green" x="200" y="212" text-anchor="middle" dominant-baseline="central">Quality gate</text>
<text class="ts ts-green" x="200" y="230" text-anchor="middle" dominant-baseline="central">Great Expectations 1.17</text>

<line x1="200" y1="156" x2="200" y2="188" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-green" x="420" y="190" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-green" x="510" y="212" text-anchor="middle" dominant-baseline="central">Validates</text>
<text class="ts ts-green" x="510" y="230" text-anchor="middle" dominant-baseline="central">Agency, type, fields</text>

<line class="leader" x1="320" y1="218" x2="418" y2="218"/>

<!-- Stage 3: Classify -->
<rect class="fill-purple" x="80" y="280" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-purple" x="200" y="302" text-anchor="middle" dominant-baseline="central">Classify</text>
<text class="ts ts-purple" x="200" y="320" text-anchor="middle" dominant-baseline="central">Compliance risk assessment</text>

<line x1="200" y1="246" x2="200" y2="278" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-purple" x="420" y="280" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-purple" x="510" y="302" text-anchor="middle" dominant-baseline="central">Amazon Bedrock</text>
<text class="ts ts-purple" x="510" y="320" text-anchor="middle" dominant-baseline="central">Claude Sonnet 4.6</text>

<line x1="322" y1="302" x2="418" y2="302" class="arr" marker-end="url(#arrow)"/>
<line x1="418" y1="314" x2="322" y2="314" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 4: Load — Delta Lake -->
<rect class="fill-amber" x="80" y="380" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-amber" x="190" y="402" text-anchor="middle" dominant-baseline="central">Write to Delta Lake</text>
<text class="ts ts-amber" x="190" y="420" text-anchor="middle" dominant-baseline="central">Bronze + Gold tables</text>

<!-- Stage 4: Load — Audit -->
<rect class="fill-coral" x="380" y="380" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-coral" x="490" y="402" text-anchor="middle" dominant-baseline="central">Write audit trail</text>
<text class="ts ts-coral" x="490" y="420" text-anchor="middle" dominant-baseline="central">Classification log</text>

<line x1="160" y1="336" x2="160" y2="378" class="arr" marker-end="url(#arrow)"/>
<line x1="240" y1="336" x2="490" y2="378" class="arr" marker-end="url(#arrow)"/>

<!-- Databricks -->
<rect class="fill-amber" x="80" y="470" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-amber" x="190" y="492" text-anchor="middle" dominant-baseline="central">Databricks</text>
<text class="ts ts-amber" x="190" y="510" text-anchor="middle" dominant-baseline="central">Unity Catalog + Delta</text>

<line x1="190" y1="436" x2="190" y2="468" class="arr" marker-end="url(#arrow)"/>

<!-- PostgreSQL -->
<rect class="fill-coral" x="380" y="470" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th th-coral" x="490" y="492" text-anchor="middle" dominant-baseline="central">PostgreSQL (RDS)</text>
<text class="ts ts-coral" x="490" y="510" text-anchor="middle" dominant-baseline="central">Full audit trail</text>

<line x1="490" y1="436" x2="490" y2="468" class="arr" marker-end="url(#arrow)"/>

<!-- Footer -->
<text class="ts ts-gray" x="340" y="564" text-anchor="middle">All infrastructure provisioned by Terraform / OpenTofu</text>

</svg>
